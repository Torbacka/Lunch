# Server-side nginx config for lunch.torbacka.se
# Deploy to: /etc/nginx/sites-available/lunch.torbacka.se
# Enable with: sudo ln -s /etc/nginx/sites-available/lunch.torbacka.se /etc/nginx/sites-enabled/
#
# Blue-green upstream is controlled by deploy.sh which copies
# nginx/upstream-{blue,green}.conf -> /etc/nginx/conf.d/lunchbot-upstream.conf
# and reloads nginx on each deploy.
#
# The upstream conf is auto-included via nginx.conf's "include /etc/nginx/conf.d/*.conf"
# so we must NOT include it again here to avoid "duplicate upstream" errors.

server {
    listen 80;
    server_name lunch.torbacka.se;

    location / {
        proxy_pass http://lunchbot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://lunchbot/health;
        access_log off;
    }
}
