apiVersion: 1

groups:
  - orgId: 1
    name: LunchBot Uptime
    folder: LunchBot
    interval: 1m
    rules:
      - uid: lunchbot-uptime-alert
        title: LunchBot App Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up{job="lunchbot"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              reducer: last
              expression: A
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "LunchBot application is unreachable"
          description: "The health probe for LunchBot has been failing for 5+ minutes. Check container status and logs."
        labels:
          severity: critical

contactPoints:
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-alert-receiver
        type: email
        settings:
          addresses: "lunch-alert@torbacka.se"
          singleEmail: true
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: email-alerts
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
