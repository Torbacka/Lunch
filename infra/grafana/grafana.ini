[server]
root_url = %(protocol)s://%(domain)s:%(http_port)s/grafana/

[smtp]
enabled = true
host = smtp.resend.com:587
user = resend
password = ${RESEND_API_KEY}
from_address = lunchbot-alerts@yourdomain.com
from_name = LunchBot Alerts
startTLS_policy = MandatoryStartTLS

[alerting]
enabled = true
execute_alerts = true

[unified_alerting]
enabled = true
