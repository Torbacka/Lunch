name: Deploy LunchBot

on:
  push:
    branches: [master]
    paths:
      - lunchbot/**
      - migrations/**
      - tests/**
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - scripts/deploy.sh
      - .github/workflows/deploy.yml

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Home Server
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run blue-green deploy
        run: bash scripts/deploy.sh

      - name: Prune old images
        run: docker image prune -f
