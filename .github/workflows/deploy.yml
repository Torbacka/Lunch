name: Deploy LunchBot

on:
  push:
    branches: [master]
    paths:
      - lunchbot/**
      - migrations/**
      - tests/**
      - resources/**
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - scripts/deploy.sh
      - .github/workflows/deploy.yml

  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lunchbot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lunchbot_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/lunchbot_test
      TEST_DATABASE_URL: postgresql://postgres:testpass@localhost:5432/lunchbot_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations on test database
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to Home Server
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run blue-green deploy
        run: bash scripts/deploy.sh

      - name: Prune old images
        run: docker image prune -f
