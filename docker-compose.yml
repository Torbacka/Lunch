services:
  postgres:
    image: postgres:16-alpine
    container_name: lunchbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lunchbot
      POSTGRES_USER: lunchbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunchbot -d lunchbot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lunchbot-net

  app-blue:
    build: .
    image: lunchbot:latest
    container_name: lunchbot-blue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /opt/lunchbot/.env
    ports:
      - "127.0.0.1:5001:5000"
    profiles:
      - blue
    networks:
      - lunchbot-net

  app-green:
    build: .
    image: lunchbot:latest
    container_name: lunchbot-green
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /opt/lunchbot/.env
    ports:
      - "127.0.0.1:5002:5000"
    profiles:
      - green
    networks:
      - lunchbot-net

volumes:
  pgdata:
    driver: local

networks:
  lunchbot-net:
    driver: bridge
