services:
  postgres:
    image: postgres:16-alpine
    container_name: lunchbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lunchbot
      POSTGRES_USER: lunchbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunchbot -d lunchbot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lunchbot-net

  app-blue:
    build: .
    image: lunchbot:latest
    container_name: lunchbot-blue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /opt/lunchbot/.env
    ports:
      - "127.0.0.1:5001:5000"
    profiles:
      - blue
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - lunchbot-net

  app-green:
    build: .
    image: lunchbot:latest
    container_name: lunchbot-green
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /opt/lunchbot/.env
    ports:
      - "127.0.0.1:5002:5000"
    profiles:
      - green
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - lunchbot-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: lunchbot-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - lunchbot-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: lunchbot-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_PATHS_CONFIG=/etc/grafana/grafana.ini
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - lunchbot-net

volumes:
  pgdata:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  lunchbot-net:
    driver: bridge
