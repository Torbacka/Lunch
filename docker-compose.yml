services:
  postgres:
    image: postgres:16-alpine
    container_name: lunchbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lunchbot
      POSTGRES_USER: lunchbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunchbot -d lunchbot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lunchbot-net

  app-blue:
    build: .
    image: lunchbot:latest
    container_name: lunchbot-blue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_DB_URL: ${APP_DB_URL}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      FERNET_KEY: ${FERNET_KEY}
      SECRET_KEY: ${SECRET_KEY}
    expose:
      - "5000"
    profiles:
      - blue
    networks:
      - lunchbot-net

  app-green:
    build: .
    image: lunchbot:latest
    container_name: lunchbot-green
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_DB_URL: ${APP_DB_URL}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      FERNET_KEY: ${FERNET_KEY}
      SECRET_KEY: ${SECRET_KEY}
    expose:
      - "5000"
    profiles:
      - green
    networks:
      - lunchbot-net

  nginx:
    image: nginx:alpine
    container_name: lunchbot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/active_upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - lunchbot-net

volumes:
  pgdata:
    driver: local

networks:
  lunchbot-net:
    driver: bridge
